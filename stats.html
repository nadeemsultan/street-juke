		<!-- Global site tag (gtag.js) - Google Analytics -->

		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() { dataLayer.push(arguments); }
			gtag('js', new Date());

			gtag('config', 'G-VDQJL7LTZV');
		</script>

		<script>
			async function fetchData(endpoint, tableId, isInactive = false) {
				try {
					const response = await fetch(`https://api.nadeemsultan.com/${endpoint}`, {
						method: 'GET',
						referrerPolicy: "no-referrer-when-downgrade"
					});

					if (!response.ok) throw new Error('API unreachable');

					const data = await response.json();
					const tableBody = document.getElementById(tableId);
					tableBody.innerHTML = ''; // Clear loading text

					data.forEach(member => {
						const row = document.createElement('tr');

						// Format dates safely
						const dateKey = isInactive ? member.leave_date : member.join_date;
						const formattedDate = dateKey ? new Date(dateKey).toLocaleDateString() : 'N/A';

						if (isInactive) {
							// Mapping for Inactive Table
							row.innerHTML = `
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.member_name}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.status}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${formattedDate}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.time_in_crew}</td>
		                    `;
						} else {
							// Mapping for Active Table
							row.innerHTML = `
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.member_name}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${formattedDate}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.time_in_crew}</td>
		                        <td style="color: white; font-size: smaller; padding: 5px;">${member.last_active}</td>
		                    `;
						}
						tableBody.appendChild(row);
					});
				} catch (error) {
					console.error(`Error loading ${endpoint}:`, error);
					document.getElementById(tableId).innerHTML = `<tr><td colspan="4" style="color: #e81c24;">Failed to load data.</td></tr>`;
				}
			}

			// Run both on load
			window.addEventListener('DOMContentLoaded', () => {
				fetchData('vw_ActiveMembers', 'active-members-body');
				fetchData('vw_InactiveMembers', 'inactive-members-body', true);
			});
		</script>
	</head>
	<body class="landing">

		<!-- Page Wrapper -->

				<!-- Header -->

					</header>

				<!-- Main -->
					<article id="main">
						<header style="background:#273038;">

						</header>

								<section>

										<table class="alt">
											<thead>

													<th style="color: white">Joined</th>
													<th style="color: white">Time in Crew</th>
													<th style="color: white">Last Active</th>
												</tr>
											</thead>
											<tbody id="active-members-body">
												<tr>
													<td colspan="4">Loading engines...</td>
												</tr>
											</tbody>
										</table>
									</div>
								</section>
								
								<hr />
								
								<section>

											<thead>

													<th style="color: white">Status</th>
													<th style="color: white">Leave Date</th>
													<th style="color: white">Time in Crew</th>
												</tr>

												</tr>
											</tbody>
										</table>
									</div>

							</div>
