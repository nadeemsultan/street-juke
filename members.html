		<script>
			async function loadMembers() {
					const url = 'https://api.nadeemsultan.com/api/collections/members/records?sort=sort_order';
					const response = await fetch(url);
					const { items } = await response.json();

					const render = (roleType, targetId) => {
						const container = document.getElementById(targetId);
						const filtered = items.filter(m => m.role === roleType);

						container.innerHTML = filtered.map(m => {
							const imgUrl = `https://api.nadeemsultan.com/api/files/members/${m.id}/${m.car_pic}`;
							return `
								<li style="padding: 5px">
									<img src="${imgUrl}" width="100%" loading="lazy">
									<i class="fab fa-instagram">&nbsp;</i>
									<a href="https://instagram.com/${m.instagram}" target="_blank">${m.instagram}</a>
								</li>
							`;
						}).join('');
					};
					
					render('admin', 'admin-list');
					render('member', 'member-list');
				}

			loadMembers();
		</script>
